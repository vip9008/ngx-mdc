<div id="mdc-snackbars" [class.standard]="standardStyle" [ngClass]="themeClass">
    @for (item of visibleMessages; track item.request.id) {
        <mdc-snackbar-host
            [instance]="item"
            [defaultActionColor]="actionColor"
            (dismiss)="dismissById(item.request.id)">
        </mdc-snackbar-host>
    }
</div>
