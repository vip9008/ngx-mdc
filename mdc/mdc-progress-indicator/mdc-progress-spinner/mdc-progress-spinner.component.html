@if (progress === null) {
    <div class="spinner">
        <div class="circle-clipper">
            <div class="circle"></div>
        </div>
        <div class="gap-patch">
            <div class="circle"></div>
        </div>
        <div class="circle-clipper">
            <div class="circle"></div>
        </div>
    </div>
} @else {
    <div class="circle-container" [style]="'--progress: ' + progressed">
        <svg class="determinate-spinner" viewBox="0 0 36 36" aria-valuemin="0" aria-valuemax="100" [aria-valuenow]="progress" role="progressbar">
            <circle class="track" cx="18" cy="18" r="16"></circle>
            @if (active) {
                <circle class="indicator" cx="18" cy="18" r="16"></circle>
            }
        </svg>
        @if (!mini && active && showPercentage) {
            <div class="mdt-overline">{{ progressed }}</div>
        }
    </div>
}
